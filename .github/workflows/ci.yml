name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ==================== Backend (FastAPI) ====================
  api:
    name: API — lint + typecheck + test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: solarlead_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 5

    env:
      APP_ENV: development
      SUPABASE_DB_URL: postgresql://postgres:postgres@localhost:5432/solarlead_test
      REDIS_URL: redis://localhost:6379
      NEXT_PUBLIC_SUPABASE_URL: http://localhost
      NEXT_PUBLIC_SUPABASE_ANON_KEY: test
      SUPABASE_SERVICE_ROLE_KEY: test
      SUPABASE_JWT_SECRET: test-secret-key-min-32-characters-long
      ANTHROPIC_API_KEY: test

    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v6

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: apps/api/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check src tests

      - name: Ruff format check
        run: ruff format --check src tests

      - name: Mypy typecheck
        run: mypy src

      - name: Pytest
        run: pytest --cov=src --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: apps/api/coverage.xml
          flags: api
          fail_ci_if_error: false

  # ==================== Frontend (Next.js) ====================
  frontend:
    name: Frontend — lint + typecheck + build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        continue-on-error: true  # allow first run without lockfile

      - name: Install dependencies (no lockfile fallback)
        run: pnpm install
        if: failure()

      - name: Typecheck
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://ppabjpryzzkksrbnledy.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: pnpm turbo run typecheck

      - name: Biome lint check
        run: pnpm biome check .

      - name: Lint
        run: pnpm turbo run lint

      - name: Test (vitest)
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://ppabjpryzzkksrbnledy.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder
        run: pnpm turbo run test

      - name: Build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://ppabjpryzzkksrbnledy.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: pnpm turbo run build

  # ==================== SQL migration lint ====================
  sql:
    name: SQL — migration syntax check
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: solarlead_mig
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - name: Apply migrations
        env:
          PGPASSWORD: postgres
        run: |
          for f in packages/db/migrations/*.sql; do
            echo "→ applying $f"
            psql -h localhost -U postgres -d solarlead_mig -v ON_ERROR_STOP=1 -f "$f"
          done

  # ==================== E2E smoke tests (Playwright) ====================
  e2e:
    name: E2E — Playwright smoke tests
    runs-on: ubuntu-latest
    needs: [frontend]

    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        continue-on-error: true

      - name: Install dependencies (no lockfile fallback)
        run: pnpm install
        if: failure()

      - name: Install Playwright browsers
        run: pnpm --filter @solarlead/dashboard exec playwright install chromium --with-deps

      - name: Run Playwright smoke tests (public routes only)
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://ppabjpryzzkksrbnledy.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder
          NEXT_PUBLIC_API_URL: http://localhost:8000
          # E2E_TEST_EMAIL and E2E_TEST_PASSWORD intentionally NOT set here —
          # tests that require auth (03-05) skip automatically without them.
          # Add them as repository secrets to enable full authenticated e2e runs.
        working-directory: apps/dashboard
        run: pnpm test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/dashboard/playwright-results/
          retention-days: 7
