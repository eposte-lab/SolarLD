name: Deploy

# Gate on CI workflow completing successfully — prevents deploys on red CI.
# The workflow_run trigger fires when the named workflow (CI) completes on main.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-api:
    name: Deploy API → Railway
    runs-on: ubuntu-latest
    # Only deploy when CI passed (not just completed)
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Railway
        uses: bervProject/railway-deploy@main
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          service: solarlead-api

  deploy-frontend:
    name: Vercel deploys (dashboard + lead-portal)
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - run: |
          echo "Vercel auto-deploys from main — no manual action required."
          echo "See: https://vercel.com/docs/git/vercel-for-github"
