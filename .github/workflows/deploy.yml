name: Deploy

# Gate on CI workflow completing successfully — prevents deploys on red CI.
# The workflow_run trigger fires when the named workflow (CI) completes on main.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-api:
    name: Deploy API → Railway
    runs-on: ubuntu-latest
    # Only deploy when CI passed (not just completed)
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      # The third-party action bervProject/railway-deploy@main broke
      # (its container lost the `railway` binary and dropped the
      # `railway_token` input), silently failing every API deploy since
      # 2026-05-23. Use the official Railway CLI directly instead — stable
      # interface, token via the standard RAILWAY_TOKEN env var.
      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Deploy API to Railway
        run: railway up --service solarlead-api --ci
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  deploy-frontend:
    name: Vercel deploys (dashboard + lead-portal)
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - run: |
          echo "Vercel auto-deploys from main — no manual action required."
          echo "See: https://vercel.com/docs/git/vercel-for-github"
