name: Deploy

# Deploy on every push to main, plus a manual "Run workflow" button.
#
# We deliberately do NOT gate on the CI workflow_run anymore: that
# coupling silently stranded deploys whenever CI was flaky or blocked
# (e.g. Actions-minutes exhaustion). Railway's own Docker build is the
# real gate — a broken build never promotes. workflow_dispatch lets an
# operator ship the current main on demand without pushing a commit.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy-api:
    name: Deploy API → Railway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The third-party action bervProject/railway-deploy@main broke
      # (its container lost the `railway` binary and dropped the
      # `railway_token` input), silently failing every API deploy since
      # 2026-05-23. Use the official Railway CLI directly instead — stable
      # interface, token via the standard RAILWAY_TOKEN env var.
      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Deploy API to Railway
        run: railway up --service solarlead-api --ci
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  deploy-frontend:
    name: Vercel deploys (dashboard + lead-portal)
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "Vercel auto-deploys from main — no manual action required."
          echo "See: https://vercel.com/docs/git/vercel-for-github"
