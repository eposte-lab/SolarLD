[mypy]
python_version = 3.12
# Explicit mypy.ini because pyproject.toml's disable_error_codes array
# is inconsistently parsed across mypy versions (1.13–1.20 regression).
ignore_missing_imports = True
check_untyped_defs = True
disallow_incomplete_defs = True
strict_optional = False
warn_return_any = False
warn_unused_configs = True

# Disabled: all caused by the JSON type alias
#   (bool | str | int | float | Sequence[JSON] | Mapping[str, JSON] | None)
# which mypy can't narrow without explicit isinstance guards. These are
# library/type-stub gaps, not bugs in our code. Enable as type coverage grows.
# Config key is singular "disable_error_code" (not "disable_error_codes").
# mypy 1.20 silently ignores the plural form.
disable_error_code = misc, no-any-return, union-attr, arg-type, index, assignment, attr-defined, call-overload, type-arg, unused-ignore, operator, return-value, list-item, dict-item
